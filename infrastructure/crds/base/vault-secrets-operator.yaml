---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: flux-system
spec:
  releaseName: vault-secrets-operator
  targetNamespace: vault
  install:
    remediation:
      retries: 3
  interval: 5m
  chart:
    spec:
      chart: vault-secrets-operator
      version: "0.9.1"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      interval: 5m
  upgrade:
    remediation:
      remediateLastFailure: false
  values:
    defaultVaultConnection:
      enabled: true
      address: https://vault.example.az
      skipTLSVerify: true
    defaultAuthMethod:
      enabled: false
    controller:
      manager:
        logging:
          level: error

