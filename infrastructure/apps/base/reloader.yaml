metadata:
  name: reloader
  namespace: flux-system
spec:
  releaseName: reloader
  targetNamespace: shared
  interval: 5m
  chart:
    spec:
      chart: reloader
      version: "2.2.0"
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
      interval: 5m
