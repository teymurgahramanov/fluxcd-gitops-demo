---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-apps
  interval: 5m
  retryInterval: 1m
  timeout: 3m
  path: ./apps/overlays/dev-cluster
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      cluster_name: dev-cluster
      environment: development

