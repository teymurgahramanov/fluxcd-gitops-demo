---
apiVersion: v1
kind: Namespace
metadata:
  name: app22
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: app22-env
  namespace: app22
spec:
  type: kv-v2
  mount: kv
  path: gitops/app22
  destination:
    name: app22-env
    create: true
  refreshAfter: 30s
  vaultAuthRef: vault/gitops
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app22
  namespace: flux-system
spec:
  releaseName: app22
  targetNamespace: app22
  install:
    createNamespace: true
  interval: 5m
  chart:
    spec:
      chart: app22
      version: "2.0.1"
      sourceRef:
        kind: HelmRepository
        name: teymurgahramanov
        namespace: flux-system
      interval: 5m
  values:
    replicaCount: 1
    image:
      repository: teymurgahramanov/app22
      tag: "2.0.1"
      pullPolicy: IfNotPresent
    env:
      APP_ENV: ${environment}
      CLUSTER_NAME: ${cluster_name}
    envFrom:
      - secretRef:
          name: app22-env
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      hosts:
        - host: app22.example.az
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: app22-tls
          hosts:
            - app22.example.az


